services:
  # 1. Forensic Backend Service
  - type: web
    name: image-forgery-backend
    runtime: docker
    plan: free
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ELA_THRESHOLD
        value: "8.0"
      - key: REPORT_EXPIRATION_HOURS
        value: "24"

  # 2. Forensic Frontend Service
  - type: web
    name: image-forgery-frontend
    runtime: docker
    dockerContext: ./frontend
    dockerfilePath: Dockerfile
    plan: free
    # VITE_API_URL will be added manually in the dashboard after deployment
