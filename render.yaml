services:
  # 1. Forensic Backend Service (Keep Docker)
  - type: web
    name: image-forgery-backend
    runtime: docker
    plan: free
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ELA_THRESHOLD
        value: "8.0"
      - key: REPORT_EXPIRATION_HOURS
        value: "24"

  # 2. Forensic Frontend (Switch to Native Static Site)
  - type: static
    name: image-forgery-frontend
    runtime: node # Use Render's native build engine
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishDir: "frontend/dist"
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: image-forgery-backend
          property: url
