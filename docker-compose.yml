version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: forensic-postgres
    environment:
      POSTGRES_DB: forensic_db
      POSTGRES_USER: forensic
      POSTGRES_PASSWORD: forensic
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: forensic-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: forensic-backend
    command: sh -c "alembic upgrade head && uvicorn backend.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
    environment:
      DATABASE_URL: "postgresql+psycopg2://forensic:forensic@postgres:5432/forensic_db"
      SECRET_KEY: "${SECRET_KEY:?Set SECRET_KEY in environment or .env}"
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:8080"
      PRODUCTION: "true"
      REFRESH_COOKIE_SECURE: "true"
      REFRESH_COOKIE_SAMESITE: "lax"
      CSRF_COOKIE_SECURE: "true"
      CSRF_COOKIE_SAMESITE: "lax"
      CELERY_ENABLED: "true"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/1"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: forensic-worker
    command: celery -A backend.app.services.worker.celery_app worker --loglevel=info
    volumes:
      - ./uploads:/app/uploads
    environment:
      DATABASE_URL: "postgresql+psycopg2://forensic:forensic@postgres:5432/forensic_db"
      SECRET_KEY: "${SECRET_KEY:?Set SECRET_KEY in environment or .env}"
      PRODUCTION: "true"
      REFRESH_COOKIE_SECURE: "true"
      REFRESH_COOKIE_SAMESITE: "lax"
      CSRF_COOKIE_SECURE: "true"
      CSRF_COOKIE_SAMESITE: "lax"
      CELERY_ENABLED: "true"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/1"
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: "http://localhost:8000/api"
    container_name: forensic-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
